name: CI/CD

on:
  push:
    branches: [Arshad's-Branch, main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & TypeCheck
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Type check
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./backend
        run: npm run build

      - name: Test
        working-directory: ./backend
        run: npm test --if-present
        env:
          USE_IN_MEMORY_DB: 'true'
          REDIS_ENABLED: 'true'
          REDIS_URL: redis://localhost:6379

  frontend:
    name: Frontend — Build & TypeCheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Test
        working-directory: ./frontend
        run: npm test --if-present
